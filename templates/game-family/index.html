<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />

  <!-- iPad / tablet-first viewport.
       viewport-fit=cover  -> draw under the rounded corners & home indicator
       user-scalable=no    -> kids' palms shouldn't pinch-zoom the game
       maximum-scale=1     -> belt-and-braces for iOS Safari -->
  <meta name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no" />

  <!-- Add-to-home-screen / standalone chrome -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#FFF7E8" />

  <!-- TODO: replace with your game's real title + description -->
  <title>Game Family Template — QLOBE Kids</title>
  <meta name="description" content="Starter skeleton for a QLOBE Kids game family. Copy this folder, rename it, and build your modes." />

  <link rel="stylesheet" href="./css/style.css" />

  <!--
    OPTIONAL — only include this import map if your game uses three.js (3D).
    It maps the bare specifier "three" to the vendored copy in shared/.
    Delete this whole <script> block for a 2D (DOM/canvas) game.

    <script type="importmap">
      { "imports": { "three": "../../shared/vendor/three.module.min.js" } }
    </script>
  -->
</head>

<body>
  <!-- ===== Menu overlay =====
       Shown first. Each .big-button carries a data-mode attribute that
       main.js reads to launch the matching mode. Two stubs to start. -->
  <div id="menu" class="overlay">
    <h1 class="title">Game Family Template</h1>

    <div class="menu-buttons">
      <button class="big-button" data-mode="mode-a" aria-label="Mode A">
        Mode A
      </button>
      <button class="big-button" data-mode="mode-b" aria-label="Mode B">
        Mode B
      </button>
    </div>
  </div>

  <!-- ===== In-game stage =====
       Your mode renders here (add a <canvas>, tiles, cards, etc.).
       Hidden until a mode starts. -->
  <div id="stage" class="hidden">
    <p id="stage-text">Playing…</p>
  </div>

  <!-- ===== In-game HUD =====
       Home button returns to the menu. Add sound / shuffle / again as needed
       (see shared/assets/ui/ for btn-home|play|shuffle|sound.png). -->
  <div id="hud" class="hidden">
    <button id="btn-home" class="hud-button" aria-label="Home">🏠</button>
  </div>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
