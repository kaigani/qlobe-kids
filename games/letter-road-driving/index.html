<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Letter Road Driving - QLOBE Kids</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#a8d5ff" />
  <meta name="description" content="A tracing game where kids drive little cars along letter-shaped roads." />
  <link rel="icon" type="image/png" href="../../assets/favicon.png" />
  <link rel="apple-touch-icon" href="../../assets/apple-touch-icon.png" />
  <style>
    /* Keep entry files tiny: trace-path owns layout, input, speech, SFX, and QA hooks. */
    @font-face {
      font-family: 'Fredoka';
      src: url('../../shared/fonts/fredoka-latin-600-normal.woff2') format('woff2');
      font-weight: 600; font-display: swap;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; height: 100%; overflow: hidden; }
    body {
      font-family: 'Fredoka', 'Arial Rounded MT Bold', sans-serif;
      background: #a8d5ff;
      touch-action: manipulation;
      user-select: none; -webkit-user-select: none;
    }
    #game { height: 100dvh; }
  </style>
</head>
<body>
  <div id="game"></div>
  <script type="module">
    import config from './config.js';
    import { createGame } from '../../shared/js/engines/trace-path.js';
    createGame(config, document.getElementById('game'));
  </script>
</body>
</html>
