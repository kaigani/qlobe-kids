<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Story Stones · Dragon Concept Gate</title>
  <style>
    :root { color-scheme:light; font-family:system-ui,sans-serif; background:#f4eddb; color:#172c2b; }
    body { margin:0; padding:clamp(18px,4vw,52px); }
    header { max-width:900px; margin:0 auto 24px; }
    h1 { margin:.2rem 0; font-size:clamp(2rem,5vw,4rem); line-height:.95; }
    p { line-height:1.5; }
    main { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:22px; max-width:1200px; margin:auto; }
    figure { margin:0; padding:12px; background:#fffaf0; border:3px solid #183d39; border-radius:20px; box-shadow:7px 7px 0 #e8aa32; }
    img { display:block; width:100%; border-radius:12px; }
    figcaption { padding:12px 4px 3px; font-weight:800; font-size:1.1rem; }
    small { display:block; margin-top:4px; font-weight:500; color:#49625f; }
    @media(max-width:700px){main{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <header>
    <p>QLOBE Studio · Krea2 art-direction gate</p>
    <h1>Choose the dragon</h1>
    <p>The selected concept becomes the identity reference for the neutral GPT Image 2 master and six pose sprites. Click any image to inspect it at full resolution.</p>
  </header>
  <main>
    <figure><a href="dragon-seed-42.png"><img src="dragon-seed-42.png" alt="Dragon concept generated with seed 42"></a><figcaption>Seed 42<small>Warmest baby-storybook character; broad wing silhouette.</small></figcaption></figure>
    <figure><a href="dragon-seed-1337.png"><img src="dragon-seed-1337.png" alt="Dragon concept generated with seed 1337"></a><figcaption>Seed 1337<small>Most balanced full-body proportions and cleanest pose master.</small></figcaption></figure>
    <figure><a href="dragon-seed-9001.png"><img src="dragon-seed-9001.png" alt="Dragon concept generated with seed 9001"></a><figcaption>Seed 9001<small>Tallest, most elegant silhouette with the longest neck.</small></figcaption></figure>
    <figure><a href="dragon-seed-7.png"><img src="dragon-seed-7.png" alt="Dragon concept generated with seed 7"></a><figcaption>Seed 7<small>Boldest graphic outline and strongest icon-like read.</small></figcaption></figure>
  </main>
</body>
</html>
