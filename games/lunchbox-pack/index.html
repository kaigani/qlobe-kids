<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#bee3f5" />
  <title>Lunchbox Pack 🍱 — Pack it. Learn it. Have fun!</title>
  <meta name="description" content="Pack lunch boxes for four friendly kids: follow spoken requests, build a balanced meal, and count foods into the box. A warm, no-pressure practical-life game for ages 5–6." />

  <!-- Open Graph (Facebook, iMessage, Slack, WhatsApp, LinkedIn…) -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="QLOBE Kids" />
  <meta property="og:title" content="Lunchbox Pack 🍱 — Pack it. Learn it. Have fun!" />
  <meta property="og:description" content="Pack lunch boxes for four friendly kids: follow spoken requests, build a balanced meal, and count foods into the box. Ages 5–6, no reading required." />
  <meta property="og:url" content="https://kaigani.github.io/qlobe-kids/games/lunchbox-pack/" />
  <meta property="og:image" content="https://kaigani.github.io/qlobe-kids/games/lunchbox-pack/assets/splash.jpg" />
  <meta property="og:image:type" content="image/jpeg" />
  <meta property="og:image:width" content="1104" />
  <meta property="og:image:height" content="944" />
  <meta property="og:image:alt" content="Lunchbox Pack title art: a blue lunch box, a backpack, and a table of healthy foods." />

  <!-- Twitter / X card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Lunchbox Pack 🍱 — Pack it. Learn it. Have fun!" />
  <meta name="twitter:description" content="Pack lunch boxes for four friendly kids: spoken requests, food groups, and counting. Ages 5–6." />
  <meta name="twitter:image" content="https://kaigani.github.io/qlobe-kids/games/lunchbox-pack/assets/splash.jpg" />

  <!-- Icons / home-screen -->
  <link rel="icon" type="image/png" href="./assets/lunchbox-closed.png" />
  <link rel="apple-touch-icon" href="./assets/lunchbox-closed.png" />
  <meta name="apple-mobile-web-app-title" content="Lunchbox Pack" />

  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>

  <!-- ===== Splash ===== -->
  <div id="splash" class="screen">
    <a id="splash-home" class="hud-button hud-img hud-home" href="../../" aria-label="Back to all games"></a>
    <div class="splash-buttons">
      <button class="mode-button" data-mode="pack">
        <span class="mode-emoji">🎒</span> Pack for Me!
      </button>
      <button class="mode-button" data-mode="healthy">
        <span class="mode-emoji">🥗</span> Healthy Helper
      </button>
      <button class="mode-button" data-mode="count">
        <span class="mode-emoji">🔢</span> Count &amp; Pack
      </button>
    </div>
  </div>

  <!-- ===== Game ===== -->
  <div id="game" class="screen hidden">
    <button id="btn-home" class="hud-button hud-img hud-home" aria-label="Back to menu"></button>
    <div id="star-row" aria-hidden="true"></div>
    <button id="btn-sound" class="hud-button hud-img hud-sound" aria-label="Hear it again"></button>

    <div id="stage">
      <div id="shelf" aria-label="Food shelf"></div>

      <div id="char-area">
        <div id="bubble" class="hidden" role="button" aria-label="Hear the request again"></div>
        <img id="portrait" alt="" draggable="false" />
      </div>

      <div id="box-wrap">
        <div id="healthy-meter" class="hidden" aria-hidden="true"></div>
        <div id="box-area">
          <img id="box-open" src="./assets/lunchbox-open.png" alt="Open lunch box" draggable="false" />
          <div id="packed-layer"></div>
          <img id="lid" class="hidden" src="./assets/lunchbox-closed.png"
               alt="Closed lunch box — tap it!" draggable="false" />
        </div>
      </div>
    </div>
  </div>

  <!-- ===== Session-end big star ===== -->
  <div id="end-screen" class="screen hidden">
    <div class="end-star" aria-hidden="true">⭐</div>
    <div class="end-buttons">
      <button id="btn-replay" class="mode-button">🔁 Play Again</button>
      <button id="btn-menu" class="mode-button">🏠 More Games</button>
    </div>
  </div>

  <canvas id="confetti-canvas" aria-hidden="true"></canvas>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
