<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Observe Journal Engine Test</title>
  <style>
    html,
    body {
      margin: 0;
      min-height: 100%;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      overscroll-behavior: none;
      touch-action: none;
      background: #bee3f5;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <pre id="test-results" hidden></pre>
  <script type="module">
    import { createGame } from './observe-journal.js';

    const game = createGame({
      id: 'observe-journal-test',
      engine: 'observe-journal',
      title: 'Weather Watch',
      splashArt: 'emoji:🪟',
      voice: {
        cheer: 'You made a weather journal!',
        yum: 'Nice observing!',
      },
      modes: [{
        id: 'weather',
        title: 'Weather',
        rounds: 4,
        prompt: 'Be a weather scientist! Look out a real window if you can.',
        pages: [{
          scene: 'emoji:🪟',
          say: 'What is the sky doing today?',
          stickers: [
            { art: 'emoji:☀️', alt: 'sunny', say: 'Sunny! Hello sunshine!' },
            { art: 'emoji:☁️', alt: 'cloudy', say: 'Cloudy, big soft clouds!' },
            { art: 'emoji:🌧️', alt: 'rainy', say: 'Rainy! Drip drop drip!' },
            { art: 'emoji:❄️', alt: 'snowy', say: 'Snowy! Brrr and beautiful!' },
          ],
        }, {
          scene: ['emoji:🌳', 'emoji:🍃', 'emoji:🌼'],
          prompts: [{
            say: 'What is moving outside?',
            stickers: [
              { art: 'emoji:🍃', alt: 'leaf', say: 'A leaf is moving!' },
              { art: 'emoji:🫧', alt: 'bubble', say: 'A bubble floats by!' },
              { art: 'emoji:🐦', alt: 'bird', say: 'A bird is flying!' },
            ],
          }, {
            say: 'Pick one more thing you notice.',
            stickers: [
              { art: 'emoji:🌼', alt: 'flower', say: 'A flower is bright!' },
              { art: 'emoji:🌳', alt: 'tree', say: 'A tree is standing tall!' },
              { art: 'emoji:🪨', alt: 'rock', say: 'A rock is resting there!' },
            ],
          }],
        }, {
          scene: 'emoji:🏠',
          say: 'How does outside feel in your imagination?',
          stickers: [
            { art: 'emoji:🧣', alt: 'cold', say: 'Cold and cozy!' },
            { art: 'emoji:🩳', alt: 'warm', say: 'Warm and breezy!' },
            { art: 'emoji:🌀', alt: 'windy', say: 'Windy, whoosh!' },
            { art: 'emoji:🌈', alt: 'rainbow', say: 'Rainbow bright!' },
          ],
        }, {
          scene: ['emoji:🪟', 'emoji:🌤️'],
          say: 'What sticker belongs on your weather page?',
          stickers: [
            { art: 'emoji:😄', alt: 'happy', say: 'Happy weather watcher!' },
            { art: 'emoji:🔎', alt: 'looking', say: 'Careful looking!' },
            { art: 'emoji:⭐', alt: 'star', say: 'A star observation!' },
          ],
        }],
      }],
    }, document.getElementById('app'));

    // Optional self-driving smoke check for reviewers and headless browsers:
    // observe-journal.test.html?smoke=1 leaves a machine-readable PASS/FAIL.
    if (new URLSearchParams(location.search).has('smoke')) {
      const results = document.getElementById('test-results');
      results.hidden = false;
      (async () => {
        try {
          const debug = window.QLOBE_DEBUG;
          await debug.ready;
          debug.mute();
          debug.seed(42);
          await debug.startMode('weather');

          const firstTargets = debug.getTargets();
          if (!firstTargets.some((target) => target.id === 'scene' && target.role === 'neutral')) {
            throw new Error('missing neutral scene target');
          }
          const stickers = firstTargets.filter((target) => target.id.startsWith('sticker:'));
          if (stickers.length !== 4 || stickers.some((target) => target.role !== 'correct')) {
            throw new Error('sticker targets must all be accepted choices');
          }
          if (stickers.some((target) => target.rect.w < 95 || target.rect.h < 95)) {
            throw new Error('sticker target smaller than 96px');
          }
          if (!(await debug.tap('sticker:0')).accepted) throw new Error('first sticker was rejected');

          // Restart the same page and prove a different open-ended answer also
          // follows the exact public input path and is accepted.
          await debug.startMode('weather');
          if (!(await debug.tap('sticker:1')).accepted) throw new Error('alternate sticker was rejected');

          await debug.startMode('weather');
          while (debug.getState().screen === 'play') await debug.winRound();
          if (debug.getState().screen !== 'end') throw new Error('winRound did not reach recap');
          results.dataset.status = 'pass';
          results.textContent = 'PASS';
          game.destroy();
        } catch (error) {
          results.dataset.status = 'fail';
          results.textContent = `FAIL: ${error && error.stack || error}`;
        }
      })();
    }
  </script>
</body>
</html>
