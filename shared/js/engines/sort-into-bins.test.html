<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Sort Into Bins Engine Test</title>
  <style>
    html,
    body {
      margin: 0;
      min-height: 100%;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      overscroll-behavior: none;
      touch-action: none;
      background: #bee3f5;
    }

    #app {
      min-height: 100dvh;
    }
  </style>
</head>
<body>
  <main id="app"></main>
  <script type="module">
    import { createGame } from './sort-into-bins.js';

    const fixture = {
      id: 'sort-into-bins-test',
      engine: 'sort-into-bins',
      title: 'Basket Sort',
      splashEmoji: '🧺',
      voice: {
        intro: 'Where does it go?',
        nudge: 'Almost. Try another basket.',
        roundCheer: 'All sorted!',
        cheer: 'Hooray! You sorted them all!',
        yums: [
          'That belongs there!',
          'Nice sorting!',
          'You found the basket!',
        ],
      },
      modes: [{
        id: 'foods',
        title: 'Foods',
        rounds: 3,
        prompt: 'Where does it go? Listen and sort!',
        bins: [
          { id: 'fruit', art: 'emoji:🍎', say: 'fruit' },
          { id: 'veg', art: 'emoji:🥕', say: 'vegetables' },
          { id: 'treat', art: 'emoji:🧁', say: 'treats' },
        ],
        itemsPerRound: 4,
        items: [
          { art: 'emoji:🍌', say: 'banana', bin: 'fruit' },
          { art: 'emoji:🍓', say: 'strawberry', bin: 'fruit' },
          { art: 'emoji:🍇', say: 'grapes', bin: 'fruit' },
          { art: 'emoji:🥦', say: 'broccoli', bin: 'veg' },
          { art: 'emoji:🌽', say: 'corn', bin: 'veg' },
          { art: 'emoji:🥒', say: 'cucumber', bin: 'veg' },
          { art: 'emoji:🍪', say: 'cookie', bin: 'treat' },
          { art: 'emoji:🍩', say: 'donut', bin: 'treat' },
          { art: 'emoji:🍦', say: 'ice cream', bin: 'treat' },
        ],
      }],
    };

    // Pass ?config=../../../games/<id>/config.js to exercise a consuming game
    // without copying its data here. ?qa=1 runs the public debug contract and
    // leaves a machine-readable result on <body> for a headless smoke test.
    const params = new URLSearchParams(location.search);
    const configUrl = params.get('config');
    const localConfig = /^\.\.\/\.\.\/\.\.\/games\/[a-z0-9-]+\/config\.js$/.test(configUrl || '');
    const config = localConfig ? (await import(configUrl)).default : fixture;
    createGame(config, document.getElementById('app'));

    if (params.get('qa') === '1') {
      try {
        const debug = window.QLOBE_DEBUG;
        await debug.ready;
        debug.mute();
        debug.seed(27);
        const mode = debug.listModes()[0];
        await debug.startMode(mode.id);

        const initial = debug.getTargets();
        const item = initial.find((target) => target.id === 'item:current');
        const wrong = initial.find((target) => target.role === 'wrong');
        if (!item || !wrong) throw new Error('missing item or wrong-bin target');
        await debug.tap(item.id);
        const wrongResult = await debug.tap(wrong.id);
        if (!wrongResult.accepted || !debug.getState().awaitingInput) {
          throw new Error('wrong-bin retry did not return to input');
        }

        while (debug.getState().screen === 'play') await debug.winRound();
        if (debug.getState().screen !== 'end') throw new Error('winRound did not reach end');
        document.body.dataset.qa = 'passed';
      } catch (error) {
        document.body.dataset.qa = 'failed';
        document.body.dataset.qaError = error && error.message ? error.message : String(error);
        console.error(error);
      }
    }
  </script>
</body>
</html>
